@if (variant === 'unavailable') {
  <div class="boot-screen" role="alert">
    <div class="boot-screen__card">
      <div class="boot-screen__icon boot-screen__icon--error">!</div>
      <h1 class="boot-screen__title">API Unavailable</h1>
      <p class="boot-screen__message">
        Unable to connect to the API server after 60 seconds. Please make sure the
        API is running and reload the page.
      </p>
    </div>
  </div>
} @else if (variant === 'connecting') {
  <div class="boot-screen" role="status" aria-label="Connecting to API">
    <div class="boot-screen__card">
      <div class="boot-screen__spinner"></div>
      <h1 class="boot-screen__title">Connecting to API&hellip;</h1>
      <p class="boot-screen__message">Waiting for the backend server to start.</p>
    </div>
  </div>
}
